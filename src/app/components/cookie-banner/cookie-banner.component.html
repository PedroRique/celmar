<div
  *ngIf="visible"
  class="cookie-banner"
  role="dialog"
  aria-labelledby="cookie-banner-title"
  aria-modal="true"
>
  <div class="cookie-banner__inner container">
    <p id="cookie-banner-title" class="cookie-banner__text">
      Utilizamos cookies para melhorar a sua experiência em nosso site. Ao
      clicar em “Aceitar”, você concorda com o uso dessas tecnologias conforme
      nossa
      <a routerLink="/politica-de-privacidade">Política de Privacidade</a>.
    </p>
    <div class="cookie-banner__actions">
      <button
        type="button"
        class="cookie-banner__btn cookie-banner__btn--primary"
        (click)="accept()"
      >
        Aceitar
      </button>
    </div>
  </div>
</div>
