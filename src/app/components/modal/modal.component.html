<div class="container-fluid" id="modal-galeria" [ngClass]="{'show': showModal}">
    <!-- Galeria de imagens/vídeos/YouTube -->
    <ng-image-slider 
        #imageSlider 
        [images]="images" 
        [animationSpeed]="0.3" 
        [videoAutoPlay]="true" 
        [showVideoControls]="true" 
        (lightboxClose)="onClose()">
    </ng-image-slider>
</div>
